<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>費城半導體看板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 6px;
      color: #58a6ff;
    }

    #update-time {
      text-align: center;
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin: 24px 0 12px;
      padding-left: 10px;
      border-left: 4px solid #58a6ff;
      color: #58a6ff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: transform 0.2s;
      cursor: pointer;
    }

    .card:hover { 
      transform: translateY(-3px);
      border-color: #58a6ff;
    }

    .card .name {
      font-size: 0.95rem;
      color: #8b949e;
      margin-bottom: 6px;
    }

    .card .price {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .card .change {
      font-size: 1rem;
      font-weight: bold;
    }

    .up { color: #f85149; }
    .down { color: #3fb950; }
    .neutral { color: #8b949e; }

    .card.up-card { border-color: rgba(248,81,73,0.4); }
    .card.down-card { border-color: rgba(63,185,80,0.4); }

    .tw-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .tw-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .tw-card .tw-code { font-size: 0.75rem; color: #58a6ff; margin-bottom: 4px; }
    .tw-card .tw-name { font-size: 0.85rem; color: #8b949e; margin-bottom: 4px; }
    .tw-card .tw-price { font-size: 1.2rem; font-weight: bold; }
    .tw-card .tw-change { font-size: 0.85rem; font-weight: bold; }

    .loader {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-left: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.75rem;
      color: #30363d;
    }

    .error { color: #f85149; }
  </style>
</head>
<body>

<h1>💡 費城半導體看板</h1>
<div id="update-time">載入中... <span class="loader"></span></div>

<!-- 費城半導體指數 -->
<div class="section-title">📊 費城半導體指數 (SOX)</div>
<div class="grid" id="sox-grid"></div>

<!-- 相關台股 -->
<div class="section-title">🇹🇼 台股相關個股</div>
<div class="tw-grid" id="tw-grid"></div>

<footer>資料來源：Finnhub・TWSE｜僅供參考，不構成投資建議</footer>

<script>
  const FINNHUB_KEY = 'd830mrhr01ql4onfpq50d830mrhr01ql4onfpq5g';
  // 改成使用 Vercel API（如果部署的話）
  const TW_API_BASE = window.location.hostname.includes('localhost') 
    ? 'http://localhost:3000'
    : 'https://stock-dashboard-kappa.vercel.app'; // 改成你的 Vercel URL

  // SOX 相關美股
  const soxStocks = [
    { symbol: 'NVDA', name: 'NVIDIA' },
    { symbol: 'AMD',  name: 'AMD' },
    { symbol: 'INTC', name: 'Intel' },
    { symbol: 'QCOM', name: 'Qualcomm' },
    { symbol: 'MU',   name: 'Micron' },
    { symbol: 'TSM',  name: 'TSMC ADR' },
    { symbol: 'AVGO', name: 'Broadcom' },
    { symbol: 'AMAT', name: 'Applied Materials' },
    { symbol: 'ASML', name: 'ASML' },
    { symbol: 'KLAC', name: 'KLA' },
  ];

  // SOX 指數本身
  const soxIndex = { symbol: '^SOX', name: '費城半導體指數', isIndex: true };

  // 台股相關
  const twStocks = [
    { code: '2330', name: '台積電' },
    { code: '2303', name: '聯電' },
    { code: '2454', name: '聯發科' },
    { code: '3711', name: '日月光投控' },
    { code: '2408', name: '南亞科' },
    { code: '2344', name: '華邦電' },
    { code: '3680', name: '家登' },
    { code: '3583', name: '辛耘' },
    { code: '2379', name: '瑞昱' },
  ];

  function colorClass(val) {
    if (val > 0) return 'up';
    if (val < 0) return 'down';
    return 'neutral';
  }

  function cardClass(val) {
    if (val > 0) return 'up-card';
    if (val < 0) return 'down-card';
    return '';
  }

  function arrow(val) {
    if (val > 0) return '▲';
    if (val < 0) return '▼';
    return '－';
  }

  // Finnhub
  async function fetchFinnhub(symbol) {
    try {
      const url = `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(symbol)}&token=${FINNHUB_KEY}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch (e) {
      console.error(`Finnhub error for ${symbol}:`, e);
      return null;
    }
  }

  function renderUsCard(data, info) {
    if (!data || !data.c) {
      return `<div class="card"><div class="name">${info.name}</div><div class="change error">載入失敗</div></div>`;
    }
    const pct = data.dp ?? 0;
    const price = data.c ?? 0;
    const diff = data.d ?? 0;
    return `
      <div class="card ${cardClass(pct)}">
        <div class="name">${info.name}</div>
        <div class="price ${colorClass(pct)}">${price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
        <div class="change ${colorClass(pct)}">${arrow(pct)} ${diff >= 0 ? '+' : ''}${diff.toFixed(2)} (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)</div>
      </div>`;
  }

  // 台股 - 用 Vercel API
  async function fetchTwStock(code) {
    try {
      const url = `${TW_API_BASE}/api/stock?code=${code}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      
      const d = json.msgArray?.[0];
      if (!d) return null;
      
      const price = parseFloat(d.z) || parseFloat(d.y);
      const yesterday = parseFloat(d.y);
      if (!price || !yesterday) return null;
      
      const change = +(price - yesterday).toFixed(2);
      const pct = +((change / yesterday) * 100).toFixed(2);
      return { price, change, pct };
    } catch (e) {
      console.error(`TW error for ${code}:`, e);
      return null;
    }
  }

  function renderTwCard(stock, result) {
    if (!result) {
      return `
        <div class="tw-card">
          <div class="tw-code">${stock.code}</div>
          <div class="tw-name">${stock.name}</div>
          <div class="tw-price error">N/A</div>
        </div>`;
    }
    const { price, change, pct } = result;
    return `
      <div class="tw-card">
        <div class="tw-code">${stock.code}</div>
        <div class="tw-name">${stock.name}</div>
        <div class="tw-price ${colorClass(pct)}">${price.toFixed(2)}</div>
        <div class="tw-change ${colorClass(pct)}">${arrow(pct)} ${change >= 0 ? '+' : ''}${change.toFixed(2)} (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)</div>
      </div>`;
  }

  async function loadAll() {
    document.getElementById('update-time').innerHTML = '更新中... <span class="loader"></span>';

    // === SOX 指數 + 成分股 ===
    const soxGrid = document.getElementById('sox-grid');
    soxGrid.innerHTML = '';

    // SOX 指數
    const soxData = await fetchFinnhub('^SOX');
    soxGrid.innerHTML += renderUsCard(soxData, soxIndex);

    // SOX 成分股
    for (const stock of soxStocks) {
      const data = await fetchFinnhub(stock.symbol);
      soxGrid.innerHTML += renderUsCard(data, stock);
    }

    // === 台股 ===
    const twGrid = document.getElementById('tw-grid');
    twGrid.innerHTML = '';
    for (const stock of twStocks) {
      const result = await fetchTwStock(stock.code);
      twGrid.innerHTML += renderTwCard(stock, result);
    }

    // 更新時間
    const now = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
    document.getElementById('update-time').innerHTML = `最後更新：${now}`;
  }

  loadAll();
  setInterval(loadAll, 60000); // 每 60 秒更新
</script>

</body>
</html>
